<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>节律 · PMS 情绪陪伴</title>
<style>
:root{
  --blue:#4263eb; --blue2:#5c7cfa; --blue-deep:#25347a; --blue-ink:#1e2a5e;
  --lav:#eef1ff; --lav2:#f6f4ff;
  --pink:#ff9bb3; --pink-soft:#ffd7e0;
  --card:rgba(255,255,255,.72); --card-solid:#ffffff;
  --gray:#8a93b8; --gray2:#a9b0cf; --line:rgba(120,140,200,.14);
  --shadow:0 10px 30px rgba(80,110,220,.12);
  --shadow-sm:0 4px 14px rgba(80,110,220,.10);
  --radius:22px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:radial-gradient(1200px 800px at 30% 0%, #dfe6ff 0%, #e9ecff 40%, #eef0fb 100%);
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;
  color:var(--blue-ink);
}
/* ===== phone frame ===== */
.phone{
  position:relative;width:390px;height:844px;border-radius:54px;
  background:#0b0e1a;padding:13px;box-shadow:0 40px 90px rgba(40,60,140,.35),0 8px 20px rgba(0,0,0,.25);
}
.screen{
  position:relative;width:100%;height:100%;border-radius:42px;overflow:hidden;
  background:linear-gradient(180deg,#e8ecff 0%,#eef0ff 30%,#f4f2ff 100%);
  display:flex;flex-direction:column;
}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:126px;height:33px;background:#0b0e1a;border-radius:0 0 20px 20px;z-index:60}
/* status bar */
.statusbar{display:flex;justify-content:space-between;align-items:center;padding:14px 26px 4px;font-weight:600;font-size:15px;z-index:50}
.statusbar .r{display:flex;gap:6px;align-items:center}
.sigicon{width:17px;height:11px}
/* scroll area */
.body{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 18px 96px;scroll-behavior:smooth}
.body::-webkit-scrollbar{display:none}
/* header */
.logo{font-size:26px;font-weight:800;letter-spacing:2px;background:linear-gradient(90deg,#2b3f9e,#5c7cfa);-webkit-background-clip:text;background-clip:text;color:transparent;position:relative;display:inline-block}
.logo .sp{position:absolute;right:-16px;top:-6px;color:#7c93ff;font-size:14px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 2px 0}
.bell{width:38px;height:38px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);position:relative}
.bell::after{content:"";position:absolute;top:9px;right:10px;width:7px;height:7px;background:var(--blue2);border-radius:50%;border:2px solid #fff}
.h1{font-size:31px;font-weight:800;margin:14px 2px 4px;letter-spacing:1px}
.sub{color:var(--gray);font-size:15px;margin:0 2px 14px}
/* mascot */
.mascot{position:absolute;pointer-events:none}
.card{background:var(--card);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px;border:1px solid rgba(255,255,255,.6)}
.card-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;margin-bottom:12px}
.card-title .ic{color:var(--blue)}
/* input box */
.recinput{min-height:96px;width:100%;border:none;background:transparent;resize:none;font-size:15px;color:var(--blue-ink);outline:none;font-family:inherit;line-height:1.5}
.recinput::placeholder{color:var(--gray2)}
.rec-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:6px}
.rbtn{width:46px;height:46px;border-radius:50%;background:#fff;box-shadow:var(--shadow-sm);border:none;display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:18px;cursor:pointer;transition:.15s}
.rbtn:active{transform:scale(.9)}
.send-btn{margin-top:10px;width:100%;padding:13px;border:none;border-radius:16px;background:linear-gradient(90deg,#4263eb,#5c7cfa);color:#fff;font-size:15px;font-weight:700;box-shadow:0 8px 20px rgba(66,99,235,.35);cursor:pointer;transition:.15s}
.send-btn:active{transform:scale(.97)}
.send-btn[disabled]{opacity:.45;box-shadow:none}
/* mood chips row */
.moods{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 8px;margin-bottom:14px}
.moods::-webkit-scrollbar{display:none}
.mood{flex:0 0 auto;width:58px;text-align:center;cursor:pointer}
.mood .ci{width:58px;height:58px;border-radius:50%;background:#fff;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:5px;transition:.15s;border:2px solid transparent}
.mood.on .ci{border-color:var(--blue2);background:#eef2ff;transform:translateY(-3px)}
.mood span{font-size:12px;color:var(--gray)}
/* cycle status card */
.cycle-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.link{color:var(--blue);font-size:13px;font-weight:600}
.bignum{font-size:44px;font-weight:800;line-height:1}
.bignum small{font-size:18px;font-weight:600;margin-left:4px}
.ring-wrap{display:flex;align-items:center;justify-content:space-between;gap:12px}
.tiny{color:var(--gray2);font-size:12px;margin-top:8px}
.conf{display:flex;align-items:center;gap:6px;margin-top:14px;background:rgba(255,255,255,.55);border-radius:12px;padding:8px 12px;font-size:13px;color:var(--blue-deep);font-weight:600}
.dots{display:flex;gap:5px;margin-left:auto}
.dots i{width:7px;height:7px;border-radius:4px;background:#c8d2ff}
.dots i.on{width:16px;background:var(--blue2)}
/* banner */
.banner{background:linear-gradient(100deg,#dfe6ff,#eae4ff);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden}
.banner h3{margin:0 0 3px;font-size:16px;color:var(--blue-deep)}
.banner p{margin:0;font-size:13px;color:var(--gray)}
.banner .fl{position:absolute;right:-6px;bottom:-10px;font-size:52px;opacity:.5}
/* recognition card */
.recog{border:1.5px dashed rgba(92,124,250,.5);background:rgba(255,255,255,.75)}
.recog .tags{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 14px}
.tag{background:#eef2ff;color:var(--blue-deep);border-radius:12px;padding:7px 12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;animation:pop .3s ease}
@keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.recog .row{display:flex;gap:10px}
.ghost{flex:1;padding:11px;border-radius:14px;border:1.5px solid var(--blue2);background:transparent;color:var(--blue);font-weight:700;font-size:14px;cursor:pointer}
.fill{flex:1;padding:11px;border-radius:14px;border:none;background:linear-gradient(90deg,#4263eb,#5c7cfa);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.thinking{display:flex;align-items:center;gap:8px;color:var(--blue);font-size:14px;font-weight:600}
.thinking .d{width:7px;height:7px;border-radius:50%;background:var(--blue2);animation:bl 1s infinite}
.thinking .d:nth-child(2){animation-delay:.2s}.thinking .d:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,60%,100%{opacity:.3}30%{opacity:1}}
/* timeline */
.tl-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.tl-item:last-child{border:none}
.tl-dot{flex:0 0 auto;width:36px;height:36px;border-radius:50%;background:#eef2ff;display:flex;align-items:center;justify-content:center;font-size:17px}
.tl-item .t{font-size:11px;color:var(--gray2)}
.tl-item .c{font-size:14px;color:var(--blue-ink);margin-top:2px}
/* tabbar */
.tabbar{position:absolute;bottom:0;left:0;right:0;height:82px;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(120,140,200,.12);display:flex;padding-bottom:14px;z-index:40}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--gray2);font-size:11px;cursor:pointer;transition:.15s}
.tab svg{width:24px;height:24px}
.tab.on{color:var(--blue)}
.tab.on span{font-weight:700}
/* chat */
.msg{max-width:82%;margin-bottom:14px;animation:rise .35s ease}
@keyframes rise{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.msg .who{display:flex;align-items:center;gap:6px;font-weight:700;font-size:14px;margin-bottom:6px;color:var(--blue-deep)}
.msg .bub{background:#fff;border-radius:16px;padding:14px 16px;font-size:15px;line-height:1.55;box-shadow:var(--shadow-sm)}
.msg.me{margin-left:auto}
.msg.me .who{justify-content:flex-end}
.msg.me .bub{background:#eef2ff}
.action-card{background:linear-gradient(120deg,#e6ecff,#eee7ff);border-radius:16px;padding:14px 16px;margin-top:10px}
.action-card .lbl{display:flex;align-items:center;gap:6px;color:var(--blue);font-weight:700;font-size:14px;margin-bottom:8px}
.action-card .q{font-size:16px;font-weight:700;color:var(--blue-deep);line-height:1.5}
.chat-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.chip-btn{background:#fff;border:1px solid var(--line);border-radius:14px;padding:9px 12px;font-size:13px;font-weight:600;color:var(--blue-deep);cursor:pointer;display:flex;align-items:center;gap:5px}
.chip-btn:active{background:#eef2ff}
.chat-input{position:absolute;bottom:96px;left:14px;right:14px;display:flex;gap:8px;align-items:center;background:#fff;border-radius:22px;padding:6px 6px 6px 16px;box-shadow:var(--shadow)}
.chat-input input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;background:transparent}
.chat-send{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(90deg,#4263eb,#5c7cfa);color:#fff;font-size:18px;cursor:pointer;flex:0 0 auto}
/* goals */
.seg{display:flex;gap:8px;margin-bottom:16px}
.seg button{flex:1;padding:9px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.6);font-weight:700;font-size:13px;color:var(--gray);cursor:pointer}
.seg button.on{background:linear-gradient(90deg,#4263eb,#5c7cfa);color:#fff;border-color:transparent}
.task{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.task:last-child{border:none}
.chk{width:26px;height:26px;border-radius:50%;border:2px solid #c8d2ff;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;cursor:pointer;transition:.15s}
.chk.done{background:var(--blue);border-color:var(--blue)}
.task .info{flex:1}
.task .nm{font-size:15px;font-weight:600}
.task.done .nm{color:var(--gray2);text-decoration:line-through}
.pbar{height:6px;background:#e6eaff;border-radius:4px;margin-top:7px;overflow:hidden}
.pbar i{display:block;height:100%;background:linear-gradient(90deg,#4263eb,#5c7cfa);border-radius:4px;transition:.4s}
.task .meta{text-align:right;font-size:12px;color:var(--gray)}
.rewards{display:flex;gap:10px}
.reward{flex:1;background:rgba(255,255,255,.6);border-radius:16px;padding:14px 8px;text-align:center;box-shadow:var(--shadow-sm);cursor:pointer}
.reward .em{font-size:30px}
.reward .rn{font-size:12px;color:var(--blue-ink);margin:6px 0 3px;font-weight:600;line-height:1.3}
.reward .pt{font-size:13px;font-weight:800;color:var(--blue)}
/* calendar */
.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cal-head .m{font-weight:800;font-size:17px}
.cal-head .nav{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.7);border:none;color:var(--blue);font-size:16px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.grid .wd{color:var(--gray2);font-size:12px;padding:6px 0}
.day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:50%;position:relative;cursor:pointer;font-weight:600;color:var(--blue-ink)}
.day.mute{color:#c7cde6}
.day.period{background:var(--pink-soft);color:#c0396a}
.day.fertile{background:#dfe6ff}
.day.ovul{background:var(--blue);color:#fff}
.day.today{outline:2px solid var(--blue2)}
.day.has::after{content:"";position:absolute;bottom:4px;width:5px;height:5px;border-radius:50%;background:var(--blue)}
.legend{display:flex;justify-content:space-around;margin-top:12px;font-size:12px;color:var(--gray)}
.legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
.info-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px dashed var(--line);font-size:14px}
.info-row:last-child{border:none}
.info-row .k{color:var(--gray);flex:1;display:flex;align-items:center;gap:8px}
.info-row .v{font-weight:700}
.two-btn{display:flex;gap:10px;margin-bottom:16px}
.two-btn button{flex:1;padding:13px;border-radius:16px;border:1px solid rgba(92,124,250,.4);background:rgba(255,255,255,.7);color:var(--blue-deep);font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.symp{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.symp span{background:rgba(255,255,255,.7);border:1px solid var(--line);border-radius:14px;padding:8px 12px;font-size:13px;color:var(--blue-deep);font-weight:600}
/* insights chart */
.chart{width:100%;height:180px;margin:6px 0}
.flow{display:flex;align-items:center;gap:6px;overflow-x:auto;padding:4px 0}
.flow::-webkit-scrollbar{display:none}
.flow .node{flex:0 0 auto;background:#f3f5ff;border-radius:14px;padding:12px 10px;text-align:center;width:82px;font-size:12px;font-weight:600;color:var(--blue-deep)}
.flow .node.hot{background:#dfe6ff}
.flow .node .em{font-size:22px;display:block;margin-bottom:4px}
.flow .arr{color:var(--blue2);font-size:16px;flex:0 0 auto}
/* science */
.pms-card{background:linear-gradient(120deg,#e3e9ff,#efe9ff);position:relative;overflow:hidden}
.pms-card h2{margin:0 0 10px;font-size:24px;color:var(--blue-deep)}
.pms-card p{margin:0;font-size:14px;line-height:1.6;color:#54608f;max-width:78%}
.read-btn{margin-top:14px;padding:10px 20px;border:none;border-radius:14px;background:linear-gradient(90deg,#4263eb,#5c7cfa);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.art{display:flex;align-items:center;gap:14px;padding:14px;background:var(--card);border-radius:18px;margin-bottom:12px;box-shadow:var(--shadow-sm);cursor:pointer}
.art .ai{width:44px;height:44px;border-radius:50%;background:#eef2ff;display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto}
.art h4{margin:0 0 3px;font-size:15px}
.art p{margin:0;font-size:12px;color:var(--gray)}
.art .arw{color:var(--gray2);font-size:18px}
.quick{display:flex;gap:8px;overflow-x:auto;padding:4px 0}
.quick::-webkit-scrollbar{display:none}
.quick span{flex:0 0 auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:9px 14px;font-size:13px;font-weight:600;color:var(--blue-deep);display:flex;align-items:center;gap:6px}
.disclaimer{display:flex;align-items:center;gap:10px;background:linear-gradient(100deg,#dfe6ff,#eae4ff);border-radius:16px;padding:13px 16px;font-size:13px;color:var(--blue-deep);font-weight:600;margin-top:4px}
/* modal / toast */
.overlay{position:absolute;inset:0;background:rgba(30,42,94,.35);backdrop-filter:blur(4px);z-index:80;display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:26px;width:100%;max-height:78%;overflow-y:auto;padding:22px;box-shadow:0 30px 60px rgba(30,42,94,.4);animation:rise .3s}
.modal::-webkit-scrollbar{display:none}
.brief-head{text-align:center;margin-bottom:16px}
.brief-head .day{font-size:13px;color:var(--gray)}
.brief-head h2{margin:4px 0;font-size:22px;color:var(--blue-deep)}
.brief-sec{margin-bottom:16px}
.brief-sec .st{font-weight:700;font-size:14px;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.brief-sec p{margin:0;font-size:14px;line-height:1.6;color:#54608f}
.close-btn{width:100%;padding:13px;border:none;border-radius:16px;background:linear-gradient(90deg,#4263eb,#5c7cfa);color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:6px}
.toast{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);background:rgba(30,42,94,.9);color:#fff;padding:11px 20px;border-radius:20px;font-size:14px;z-index:90;animation:rise .3s}
.phase-pill{display:inline-flex;align-items:center;gap:6px;background:#eef2ff;color:var(--blue-deep);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;margin:0 2px 14px}
.hidden{display:none!important}
.sec-title{font-weight:800;font-size:16px;margin:4px 2px 10px}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="screen">
    <!-- status bar -->
    <div class="statusbar">
      <div>9:41</div>
      <div class="r">
        <svg class="sigicon" viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="1.5" width="3" height="10.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity=".35"/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2.5c2.3 0 4.4.9 6 2.4l1.2-1.3C13.8 1.7 11.3.7 8.5.7S3.2 1.7 1.3 3.6l1.2 1.3c1.6-1.5 3.7-2.4 6-2.4z"/><path d="M8.5 6c1.3 0 2.5.5 3.4 1.4l1.2-1.3C11.9 4.9 10.3 4.2 8.5 4.2s-3.4.7-4.6 1.9l1.2 1.3C6 6.5 7.2 6 8.5 6z"/><circle cx="8.5" cy="10" r="1.6"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="3" fill="none" stroke="currentColor" opacity=".5"/><rect x="2" y="2" width="18" height="8" rx="1.5"/><rect x="23.5" y="4" width="2" height="4" rx="1"/></svg>
      </div>
    </div>

    <div class="body" id="body"><!-- rendered --></div>

    <!-- tabbar -->
    <div class="tabbar" id="tabbar"></div>
  </div>
</div>

<script>
/* ================= STATE ================= */
const TODAY = "2025-07-11";
const LS_KEY = "jielv_state_v2";

function loadState(){
  try{ const s = JSON.parse(localStorage.getItem(LS_KEY)); if(s) return s; }catch(e){}
  return null;
}
/* ===== 历史数据库：按日期编入过往记录 =====
   周期模型：上次月经 6/18 起，周期 28 天 → 卵泡期平稳、7/2 排卵、之后进入黄体期，
   越靠近下次月经(7/16) PMS 症状越明显。今天 7/11 = 黄体后期，PMS 高发。 */
function seedHistory(){
  const E=(cat,icon,label,ind,time)=>({cat,icon,label,ind,time});
  return {
    // —— 月经期（6/18–6/22）——
    "2025-06-18":[E("physical","🤕","身体不适","生活事件","09:20")],
    "2025-06-19":[E("energy","🪫","精力低","精力","10:05"),E("physical","🤕","痛经","生活事件","21:30")],
    "2025-06-20":[E("mood","😢","情绪低落","情绪","14:10")],
    // —— 卵泡期（平静、有劲）——
    "2025-06-24":[E("sleep","😴","睡眠良好","睡眠","08:00")],
    "2025-06-26":[E("mood","😌","情绪平稳","情绪","12:00")],
    "2025-06-28":[E("bowel","🚽","已排便","排便","08:30"),E("mood","😌","情绪平稳","情绪","19:00")],
    "2025-06-30":[E("sleep","😴","睡眠良好","睡眠","07:40"),E("energy","💪","精力充沛","精力","11:00")],
    // —— 排卵前后（7/2）——
    "2025-07-02":[E("mood","😌","情绪平稳","情绪","13:00")],
    // —— 黄体期，PMS 逐渐加重 ——
    "2025-07-03":[E("energy","🪫","精力低","精力","16:20")],

  }},

  {ind:"精力", cat:"energy", icon:"🪫", test:/累|疲惫|没力气|没劲|乏|困|想睡|不想动|什么都不想干|没心力|干不动/, label:()=>"精力低 / 低动力"},
  {ind:"睡眠", cat:"sleep", icon:"🌙", test:/失眠|睡不着|没睡好|熬夜|睡得少|睡不好/, label:()=>"睡眠不佳"},
  {ind:"睡眠", cat:"sleep", icon:"😴", test:/睡了|睡得好|早睡|睡够/, label:()=>"睡眠良好"},
  {ind:"皮肤", cat:"skin", icon:"🌵", test:/痘|爆痘|皮肤|出油|长闭口/, label:()=>"皮肤状态变化"},
  {ind:"生活事件", cat:"relationship", icon:"💔", test:/吵架|发火|生气|冲突|吵|翻脸|闹|伴侣|男朋友|女朋友|对象|老公|老婆/, label:t=>/吵|发火|冲突|生气|翻脸/.test(t)?"伴侣冲突":"关系互动"},
  {ind:"生活事件", cat:"life", icon:"📌", test:/加班|ddl|deadline|工作|开会|考试|论文|due/i, label:()=>"工作/学业压力"},
  {ind:"生活事件", cat:"physical", icon:"👀", test:/眼睛酸|眼酸|眼干|眼睛干|眼睛疼/, label:()=>"眼睛酸涩"},
  {ind:"生活事件", cat:"physical", icon:"🤕", test:/头疼|头痛|腹痛|肚子疼|痛经|腰疼|胸胀|乳房胀/, label:()=>"身体不适"},
  {ind:"情绪", cat:"craving", icon:"🍰", test:/想吃甜|想吃|嘴馋|甜食/, label:()=>"想吃甜食"},
];
function extract(text){
  const found=[]; const seenLabel=new Set(); const inds=new Set();
  for(const r of RULES){
    if(r.test.test(text)){
      const lb = r.label(text);
      if(seenLabel.has(lb)) continue;
      seenLabel.add(lb);
      found.push({cat:r.cat, icon:r.icon, label:lb, ind:r.ind});
      inds.add(r.ind);
    }
  }
  return {events:found, indicators:[...inds]};
}

/* ================= CYCLE PHASE ================= */
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/864e5); }
function cyclePhase(){
  const d = daysBetween(S.cycle.last, TODAY); // day in cycle (0-indexed from period start)
  const len = S.cycle.avgLen;
  const toNext = len - d;
  const prog = Math.min(99, Math.round(d/len*100));
  let phase="卵泡期", emoji="🌱";
  if(d<=5) {phase="月经期"; emoji="🩸";}
  else if(d<=12){phase="卵泡期"; emoji="🌱";}
  else if(d<=16){phase="排卵期"; emoji="💗";}
  else {phase="黄体期"; emoji="🌗";}
  return {d, toNext, prog, phase, emoji};
}
/* 由周期模型算出某个月的经期/易孕期/排卵日标记 */
function cycleMarks(year, month){
  const period=new Set(), fertile=new Set(), ovul=new Set();
  const base=new Date(S.cycle.last), len=S.cycle.avgLen, plen=S.cycle.periodLen||5;
  for(let k=-4;k<=4;k++){
    const start=new Date(base); start.setDate(start.getDate()+k*len);
    for(let i=0;i<plen;i++){ const d=new Date(start); d.setDate(d.getDate()+i); if(d.getFullYear()===year&&d.getMonth()===month) period.add(d.getDate()); }
    const ov=new Date(start); ov.setDate(ov.getDate()+len-14);
    if(ov.getFullYear()===year&&ov.getMonth()===month) ovul.add(ov.getDate());
    for(let i=1;i<=5;i++){ const f=new Date(ov); f.setDate(f.getDate()-i); if(f.getFullYear()===year&&f.getMonth()===month) fertile.add(f.getDate()); }
  }
  return {period, fertile, ovul};
}
/* 最近一次月经开始 & 预计下次 */
function periodDates(){
  const base=new Date(S.cycle.last), len=S.cycle.avgLen, today=new Date(TODAY);
  let last=new Date(base);
  while(true){ const n=new Date(last); n.setDate(n.getDate()+len); if(n>today) break; last=n; }
  const next=new Date(last); next.setDate(next.getDate()+len);
  return {last, next};
}

const AI = {
  cfg(){ try{ return JSON.parse(localStorage.getItem('jielv_ai')||'{}'); }catch(e){ return {}; } },
  saveCfg(c){ localStorage.setItem('jielv_ai', JSON.stringify(c)); },
  on(){ const c=this.cfg(); return !!(c.enabled && c.key); },
  async call(system, userContent, {json=false, maxTokens=1024}={}){
    const c=this.cfg();
    const base=(c.base||'https://api.anthropic.com').replace(/\/+$/,'');
    const model=c.model||'claude-opus-4-8';
    const ctrl=new AbortController(); const timer=setTimeout(()=>ctrl.abort(), 25000);
    try{
      let text='';
      if((c.proto||'anthropic')==='anthropic'){
        const r=await fetch(base+'/v1/messages',{method:'POST',signal:ctrl.signal,headers:{
          'content-type':'application/json','x-api-key':c.key,
          'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'
        },body:JSON.stringify({model,max_tokens:maxTokens,system,messages:[{role:'user',content:userContent}]})});
        if(!r.ok) throw new Error('HTTP '+r.status+' '+(await r.text()).slice(0,140));
        const d=await r.json(); text=(d.content||[]).map(b=>b.text||'').join('');
      } else { // OpenAI-compatible proxy
        const r=await fetch(base+'/chat/completions',{method:'POST',signal:ctrl.signal,headers:{
          'content-type':'application/json','authorization':'Bearer '+c.key
        },body:JSON.stringify({model,max_tokens:maxTokens,messages:[{role:'system',content:system},{role:'user',content:userContent}]})});
        if(!r.ok) throw new Error('HTTP '+r.status+' '+(await r.text()).slice(0,140));
        const d=await r.json(); text=d.choices[0].message.content;
      }
      clearTimeout(timer);
      if(json){ const m=text.match(/\{[\s\S]*\}/); return JSON.parse(m?m[0]:text); }
      return text;
    } finally { clearTimeout(timer); }
  }
};

async function aiExtract(text){
  if(!AI.on()) return extract(text);
  try{
    const d=await AI.call(EXTRACT_SYS, text, {json:true, maxTokens:600});
    const events=(d.events||[]).map(e=>({cat:e.category||'mood', icon:e.icon||'•', label:e.label||'已记录', ind:e.indicator||'情绪'}));
    if(!events.length) return extract(text);
    return {events, indicators:[...new Set(events.map(e=>e.ind))]};
  }catch(e){ console.warn('AI extract fallback:', e.message); return extract(text); }
}

function scrollChat(){ const f=$body; setTimeout(()=>f.scrollTop=f.scrollHeight,50); }
async function aiRespond(userText){
  if(!AI.on()){ localRespond(userText); return; }
  if(!window._chatInds) window._chatInds=new Set();
  extract(userText).indicators.forEach(i=>window._chatInds.add(i));
  S.chat.push({role:'ai', text:'', typing:true}); render(); scrollChat();
  let result=null;
  try{ result=await AI.call(chatSystem(window._chatInds.size), buildChatContext(), {json:true, maxTokens:700}); }
  catch(e){ console.warn('AI chat fallback:', e.message); }
  S.chat=S.chat.filter(m=>!m.typing);
  if(!result){ localRespond(userText); return; }
  S.chat.push({role:'ai', text:result.reply||'我在这里陪着你。', action:result.action||null});
  if(result.followup) S.chat.push({role:'ai', text:result.followup});
  else if(window._chatInds.size>=3) S.chat.push({role:'ai', text:'谢谢你告诉我这些，要不要看看今天的简报？', followBtns:['📄 看今日简报']});
  save();
}
function localRespond(userText){
  const {indicators}=extract(userText);
  if(!window._chatInds) window._chatInds=new Set();
  indicators.forEach(i=>window._chatInds.add(i));
  const have=window._chatInds.size;
  // empathy + action
  const emp = EMPATHY[Math.min(S.chat.length%EMPATHY.length, EMPATHY.length-1)];
  const act = ACTIONS[0];
  let text = emp + "\n" ;
  const msg={role:"ai", text, action:act};
  S.chat.push(msg);
  // dynamic multi-turn: collect until 3 indicators
  if(have<3){
    const missing=ALL_INDS.filter(i=>!window._chatInds.has(i));
    const ask = FOLLOWUP[missing[0]]||"还有什么想说的吗？";
    S.chat.push({role:"ai", text:"如果愿意的话，也可以多告诉我一点：\n"+ask, followBtns:quickOptions(missing[0])});
  } else {
    S.chat.push({role:"ai", text:"谢谢你告诉我这些。我已经把今天的状态记下来了，要不要看看今天的简报？", followBtns:["📄 看今日简报"]});
  }
  save();
}
function quickOptions(ind){
  const map={
    "情绪":["还挺烦的","有点低落","还好"],
    "排便":["今天拉了","有点便秘","没注意"],
    "睡眠":["没睡好","睡得还行"],
    "皮肤":["爆痘了","还行"],
    "生活事件":["和伴侣吵架了","工作压力大","没什么事"],
    "精力":["特别累","还有点劲"],
  };
  return map[ind]||["嗯","还好"];
}

      <rect x="${hlX1}" y="${pad}" width="${hlX2-hlX1}" height="${H-2*pad}" fill="#5c7cfa" opacity=".1"/>
      <line x1="${hlX1}" y1="${pad}" x2="${hlX1}" y2="${H-pad}" stroke="#9db2ff" stroke-dasharray="3" opacity=".6"/>
      <line x1="${hlX2}" y1="${pad}" x2="${hlX2}" y2="${H-pad}" stroke="#9db2ff" stroke-dasharray="3" opacity=".6"/>
      <path d="${area}" fill="url(#ag)" opacity=".5"/>
      <path d="${line}" fill="none" stroke="#4263eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${pts.filter((_,i)=>i%2===0).map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.5" fill="#4263eb"/>`).join("")}
      <text x="${(hlX1+hlX2)/2}" y="${pad-6}" text-anchor="middle" font-size="10" fill="#4263eb" font-weight="700">月经前 4-6 天</text>
      <text x="4" y="${pad+4}" font-size="9" fill="#8a93b8">强</text>
      <text x="4" y="${H-pad}" font-size="9" fill="#8a93b8">弱</text>
      <defs><linearGradient id="ag" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#9db2ff"/><stop offset="1" stop-color="#9db2ff" stop-opacity="0"/></linearGradient></defs>
    </svg>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#8a93b8;padding:0 20px">${[1,5,10,15,20,25,28].map(x=>`<span>${x}</span>`).join("")}</div>
    <div style="text-align:center;font-size:11px;color:#8a93b8;margin-top:2px">周期日</div>
    <div class="disclaimer" style="margin-top:12px">✨ 在这段时间，你的焦虑强度通常更高。</div>
  </div>
  <div class="card">
    <div class="card-title" style="font-size:16px">🌙 睡眠少于 6 小时时，烦躁更容易出现。</div>
    <div class="flow">
      <div class="node"><span class="em">🌙</span>睡得更少<br><span style="font-size:10px;color:#8a93b8">(少于6小时)</span></div>
      <span class="arr">→</span>
      <div class="node"><span class="em">📅</span>更晚的<br>周期阶段<br><span style="font-size:10px;color:#8a93b8">(黄体期)</span></div>
      <span class="arr">→</span>
      <div class="node hot"><span class="em">😣</span>更烦躁</div>
      <span class="arr">→</span>
      <div class="node"><span class="em">🌡️</span>更多<br>身体症状</div>
    </div>
    <p style="margin:10px 0 0;font-size:12px;color:var(--gray2)">✨ 这是你记录数据的常见关联，不代表因果关系。</p>
  </div>
  <div class="card">
    <div class="card-title" style="font-size:16px">🍃 什么似乎有帮助</div>
    <div class="symp"><span>🚶 短暂散步</span><span>✍️ 发消息前先暂停</span><span>🌙 早点睡</span></div>
    <p style="margin:10px 0 0;font-size:12px;color:var(--gray2)">在容易出现烦躁的阶段，你更常提到这些方法对你有帮助。</p>
  </div>
  <div class="disclaimer">🛡️ 这些是基于你记录的规律，不是医学结论。</div>
  `;
}

/* ============ SCIENCE ============ */

  <div style="height:12px"></div>

/* ============ BRIEF (简报) ============ */
function buildBrief(date){
  const ev=S.timeline[date]||[];
  const ph=cyclePhase();
  const cats=ev.map(e=>e.label);
  const list = cats.length? cats.join("、") : "今天还没有记录";
  let encourage="你今天愿意停下来记录自己，这本身就是一种照顾。";
  if(cats.some(c=>/冲突/.test(c))) encourage="和最亲近的人起冲突时，情绪往往最汹涌。这不代表你们的关系有问题，只是此刻的你需要被理解。";
  else if(cats.some(c=>/低落|焦虑|烦躁/.test(c))) encourage="情绪来的时候像潮水，会涨也会退。你已经在认真地看见它了。";
  let advice="今晚可以早一点休息，给身体一点修复的时间。";
  if(cats.some(c=>/便秘|偏硬/.test(c))) advice="黄体期孕酮升高会让肠道变慢，多喝温水、吃点富含纤维的食物会舒服一些。";
  else if(cats.some(c=>/精力|低动力/.test(c))) advice="没力气的时候不必硬撑，把今天的 DDL 拆成最小的一步，做一点点就好。";
  return {date, phase:ph.phase, emoji:ph.emoji, list, encourage, advice, ev};
}
function openBrief(date){
  const b=buildBrief(date);
  const ov=document.createElement('div');
  ov.className="overlay"; ov.onclick=(e)=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div class="modal">
    <div class="brief-head"><div class="day">${date.replace(/-/g,'.')} · ${b.emoji} ${b.phase}</div><h2>今日简报</h2><div style="font-size:13px;color:var(--gray)">温柔看见此刻的你</div></div>
    <div class="brief-sec"><div class="st">🗂️ 今天的记录</div>${b.ev.length?`<div class="tags" style="display:flex;flex-wrap:wrap;gap:8px">${b.ev.map(e=>`<div class="tag">${e.icon} ${e.label}</div>`).join("")}</div>`:`<p>${b.list}</p>`}</div>
    <div class="brief-sec"><div class="st">💙 想对你说</div><p>${b.encourage}</p></div>
    <div class="brief-sec"><div class="st">🌿 一个小建议</div><p>${b.advice}</p></div>
    <div class="disclaimer" style="margin:0 0 14px">这是基于你记录的陪伴，不是医学诊断。</div>
    <button class="close-btn" onclick="this.closest('.overlay').remove()">收下这份温柔</button>
  </div>`;
  document.querySelector('.screen').appendChild(ov);
}

/* ============ TOAST ============ */
function toast(msg){
  const t=document.createElement('div'); t.className="toast"; t.textContent=msg;
  document.querySelector('.screen').appendChild(t);
  setTimeout(()=>{t.style.opacity="0";t.style.transition=".4s";},1600);
  setTimeout(()=>t.remove(),2100);
}

function renderTabs(){
  const cur = (S.tab==="goals")?"support":S.tab;
  document.getElementById('tabbar').innerHTML=TABS.map(t=>`
    <div class="tab ${cur===t[0]?'on':''}" onclick="go('${t[0]}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${t[2]}</svg>
      <span>${t[1]}</span>
    </div>`).join("");
}

/* ============ MAIN RENDER ============ */
function render(){
  const v={home:viewHome,cycle:viewCycle,support:viewSupport,goals:viewGoals,insights:viewInsights,science:viewScience}[S.tab]||viewHome;
  $body.innerHTML=v();
  renderTabs();
  // keep draft synced
  const d=document.getElementById('draft'); if(d){ d.addEventListener('input',e=>{S.draft=e.target.value;}); }
  if(S.tab==="support") scrollChat();
}
render();
