<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>微澜 · PMS 情绪陪伴</title>
<style>
:root{
  /* 色板系统 */
  --blue:#29a9e1;         /* 主蓝 · 天空蓝 */
  --blue2:#52bce8;        /* 主蓝浅调（渐变/边框） */
  --blue-deep:#2e64c1;    /* 辅助深蓝 · 皇家蓝 */
  --blue-ink:#31282e;     /* 文字色 · 暖黑 */
  --sun:#fed32d; --sun-deep:#f2be00;      /* 主黄 · 明亮蛋黄 */
  --tomato:#d33030; --tomato-deep:#b52626;/* 主红 · 番茄红 */
  --orange:#f5871f; --orange-deep:#e0730c;  /* 橙 · 首页 */
  --royal:#2e64c1;        /* 辅助深蓝 · 皇家蓝 */
  --pink:#e6a9c2; --pink-soft:#f4dbe6;    /* 辅助粉 · 柔和粉 */
  --lightblue:#78becc;    /* 浅蓝 · 灰调浅蓝 */
  --lav:#eef7fb; --lav2:#f5fbfd;          /* 极浅天蓝底 */
  --card:#ffffff; --card-solid:#ffffff;
  --gray:#8a8188; --gray2:#b3aab0; --line:rgba(49,40,46,.12);
  --shadow:0 10px 30px rgba(49,40,46,.12);
  --shadow-sm:0 4px 14px rgba(49,40,46,.09);
  --radius:22px;
  --bg:#efeadf;           /* 背景色 · 暖白 */
  --ink:#31282e;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#e4ddce;
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;
  color:var(--blue-ink);
}
/* ===== phone frame ===== */
.phone{
  position:relative;width:390px;height:844px;border-radius:54px;
  background:#20180f;padding:13px;box-shadow:0 40px 90px rgba(90,60,20,.35),0 8px 20px rgba(0,0,0,.25);
}
.screen{
  position:relative;width:100%;height:100%;border-radius:42px;overflow:hidden;
  background:#80c101;
  display:flex;flex-direction:column;
}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:126px;height:33px;background:#20180f;border-radius:0 0 20px 20px;z-index:60}
/* status bar */
.statusbar{display:flex;justify-content:space-between;align-items:center;padding:14px 26px 4px;font-weight:600;font-size:15px;z-index:50}
.statusbar .r{display:flex;gap:6px;align-items:center}
.sigicon{width:17px;height:11px}
/* scroll area */
.body{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 18px 96px;scroll-behavior:smooth}
.body::-webkit-scrollbar{display:none}
/* header */
.logo{font-size:26px;font-weight:800;letter-spacing:2px;background:linear-gradient(90deg,#2b3f9e,#52bce8);-webkit-background-clip:text;background-clip:text;color:transparent;position:relative;display:inline-block}
.logo .sp{position:absolute;right:-16px;top:-6px;color:#7c93ff;font-size:14px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 2px 0}
.bell{width:38px;height:38px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);position:relative}
.bell::after{content:"";position:absolute;top:9px;right:10px;width:7px;height:7px;background:var(--blue2);border-radius:50%;border:2px solid #fff}
.h1{font-size:31px;font-weight:800;margin:14px 2px 4px;letter-spacing:1px}
/* ===== 三原色撞色头图 hero ===== */
.hero-block{position:relative;border-radius:24px;padding:20px 18px;margin:6px 0 16px;overflow:hidden;box-shadow:var(--shadow)}
.hero-block .hb-title{font-size:26px;font-weight:900;line-height:1.25;position:relative;z-index:2}
.hero-block .hb-sub{font-size:14px;font-weight:600;margin-top:6px;position:relative;z-index:2;opacity:.9}
.hero-block .blob{position:absolute;border-radius:50%;z-index:1}
.hero-block .blob.b1{width:120px;height:120px;right:-28px;top:-34px}
.hero-block .blob.b2{width:66px;height:66px;right:56px;bottom:-26px}
.hero-block .blob.b3{width:34px;height:34px;right:120px;top:22px}
.hero-yellow{background:var(--sun);color:var(--ink)}
.hero-blue{background:var(--blue);color:#fff}
.hero-red{background:var(--tomato);color:#fff}
.hero-sky{background:var(--sky-deep,#29a9e1);color:#fff}
.sub{color:var(--gray);font-size:15px;margin:0 2px 14px}
/* mascot */
.mascot{position:absolute;pointer-events:none}
.card{background:var(--card);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px;border:1px solid rgba(255,255,255,.6)}
.card-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;margin-bottom:12px}
.card-title .ic{color:var(--blue)}
/* input box */
.recinput{min-height:96px;width:100%;border:none;background:transparent;resize:none;font-size:15px;color:var(--blue-ink);outline:none;font-family:inherit;line-height:1.5}
.recinput::placeholder{color:var(--gray2)}
.rec-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:6px}
.rbtn{width:46px;height:46px;border-radius:50%;background:#fff;box-shadow:var(--shadow-sm);border:none;display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:18px;cursor:pointer;transition:.15s}
.rbtn:active{transform:scale(.9)}
.send-btn{margin-top:10px;width:100%;padding:13px;border:none;border-radius:16px;background:linear-gradient(90deg,#29a9e1,#52bce8);color:#fff;font-size:15px;font-weight:700;box-shadow:0 8px 20px rgba(66,99,235,.35);cursor:pointer;transition:.15s}
.send-btn:active{transform:scale(.97)}
.send-btn[disabled]{opacity:.45;box-shadow:none}
/* mood chips row */
.moods{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 8px;margin-bottom:14px}
.moods::-webkit-scrollbar{display:none}
.mood{flex:0 0 auto;width:58px;text-align:center;cursor:pointer}
.mood .ci{width:58px;height:58px;border-radius:50%;background:#fff;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:5px;transition:.15s;border:2px solid transparent}
.mood.on .ci{border-color:var(--blue2);background:#e7f5fb;transform:translateY(-3px)}
.mood span{font-size:12px;color:var(--gray)}
/* cycle status card */
.cycle-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.link{color:var(--blue);font-size:13px;font-weight:600}
.bignum{font-size:44px;font-weight:800;line-height:1}
.bignum small{font-size:18px;font-weight:600;margin-left:4px}
.ring-wrap{display:flex;align-items:center;justify-content:space-between;gap:12px}
.tiny{color:var(--gray2);font-size:12px;margin-top:8px}
.conf{display:flex;align-items:center;gap:6px;margin-top:14px;background:rgba(255,255,255,.55);border-radius:12px;padding:8px 12px;font-size:13px;color:var(--blue-deep);font-weight:600}
.dots{display:flex;gap:5px;margin-left:auto}
.dots i{width:7px;height:7px;border-radius:4px;background:#c8d2ff}
.dots i.on{width:16px;background:var(--blue2)}
/* banner */
.banner{background:linear-gradient(100deg,#dfe6ff,#eae4ff);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden}
.banner h3{margin:0 0 3px;font-size:16px;color:var(--blue-deep)}
.banner p{margin:0;font-size:13px;color:var(--gray)}
.banner .fl{position:absolute;right:-6px;bottom:-10px;font-size:52px;opacity:.5}
/* recognition card */
.recog{border:1.5px dashed rgba(92,124,250,.5);background:rgba(255,255,255,.75)}
.recog .tags{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 14px}
.tag{background:#e7f5fb;color:var(--blue-deep);border-radius:12px;padding:7px 12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;animation:pop .3s ease}
@keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.recog .row{display:flex;gap:10px}
.ghost{flex:1;padding:11px;border-radius:14px;border:1.5px solid var(--blue2);background:transparent;color:var(--blue);font-weight:700;font-size:14px;cursor:pointer}
.fill{flex:1;padding:11px;border-radius:14px;border:none;background:linear-gradient(90deg,#29a9e1,#52bce8);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.thinking{display:flex;align-items:center;gap:8px;color:var(--blue);font-size:14px;font-weight:600}
.thinking .d{width:7px;height:7px;border-radius:50%;background:var(--blue2);animation:bl 1s infinite}
.thinking .d:nth-child(2){animation-delay:.2s}.thinking .d:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,60%,100%{opacity:.3}30%{opacity:1}}
/* timeline */
.tl-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.tl-item:last-child{border:none}
.tl-dot{flex:0 0 auto;width:36px;height:36px;border-radius:50%;background:#e7f5fb;display:flex;align-items:center;justify-content:center;font-size:17px}
.tl-item .t{font-size:11px;color:var(--gray2)}
.tl-item .c{font-size:14px;color:var(--blue-ink);margin-top:2px}
/* tabbar 三原色撞色 */
.tabbar{position:absolute;bottom:0;left:0;right:0;height:82px;background:#fff;border-top:1px solid var(--line);display:flex;padding-bottom:14px;z-index:40}
.tabbar::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--orange) 0 20%,var(--sun) 20% 40%,var(--blue) 40% 60%,var(--royal) 60% 80%,var(--lightblue) 80% 100%)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--gray2);font-size:11px;cursor:pointer;transition:.15s;position:relative}
.tab svg{width:24px;height:24px}
.tab .tico{width:38px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:12px;transition:.18s}
.tab.on{font-weight:700}
.tab.on .tico{transform:translateY(-2px)}
.tab.on span{font-weight:800}
/* chat */
.msg{max-width:82%;margin-bottom:14px;animation:rise .35s ease}
@keyframes rise{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.msg .who{display:flex;align-items:center;gap:6px;font-weight:800;font-size:13px;margin-bottom:5px;color:var(--royal)}
.msg .who .av{width:24px;height:24px;border-radius:50%;object-fit:cover;flex:0 0 auto;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.msg .bub{background:#fff;border-radius:4px 16px 16px 16px;padding:13px 15px;font-size:15px;line-height:1.62;box-shadow:0 6px 16px -6px rgba(30,60,20,.28);color:var(--ink);border:1.5px solid rgba(41,169,225,.20)}
.msg.me{margin-left:auto}
.msg.me .who{justify-content:flex-end;color:#fff}
.msg.me .bub{background:#1f8fc9;color:#fff;border-radius:16px 4px 16px 16px;border:1.5px solid #1878ab;font-weight:600;box-shadow:0 6px 16px -6px rgba(20,60,110,.5)}
.action-card{background:linear-gradient(120deg,#fff4d6,#e2f4fb);border-radius:14px;padding:13px 15px;margin-top:10px;border:1px solid rgba(41,169,225,.18)}
.action-card .lbl{display:flex;align-items:center;gap:6px;color:var(--tomato);font-weight:800;font-size:13px;margin-bottom:6px}
.action-card .q{font-size:15px;font-weight:800;color:var(--royal);line-height:1.5}
/* chat 面板：托底避免气泡浮在刺眼绿色上 */
.chat-panel{background:rgba(255,255,255,.5);border-radius:20px;padding:14px 12px 12px;margin-bottom:8px;backdrop-filter:blur(2px)}
.chat-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.chip-btn{background:#fff;border:1px solid var(--line);border-radius:14px;padding:9px 12px;font-size:13px;font-weight:600;color:var(--blue-deep);cursor:pointer;display:flex;align-items:center;gap:5px}
.chip-btn:active{background:#e7f5fb}
.chat-input{position:absolute;bottom:96px;left:14px;right:14px;display:flex;gap:8px;align-items:center;background:#fff;border-radius:22px;padding:6px 6px 6px 16px;box-shadow:var(--shadow)}
.chat-input input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;background:transparent}
.chat-send{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(90deg,#29a9e1,#52bce8);color:#fff;font-size:18px;cursor:pointer;flex:0 0 auto}
/* goals */
.seg{display:flex;gap:8px;margin-bottom:16px}
.seg button{flex:1;padding:9px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.6);font-weight:700;font-size:13px;color:var(--gray);cursor:pointer}
.seg button.on{background:linear-gradient(90deg,#29a9e1,#52bce8);color:#fff;border-color:transparent}
.task{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.task:last-child{border:none}
.chk{width:26px;height:26px;border-radius:50%;border:2px solid #c8d2ff;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;cursor:pointer;transition:.15s}
.chk.done{background:var(--blue);border-color:var(--blue)}
.task .info{flex:1}
.task .nm{font-size:15px;font-weight:600}
.task.done .nm{color:var(--gray2);text-decoration:line-through}
.pbar{height:6px;background:#e6eaff;border-radius:4px;margin-top:7px;overflow:hidden}
.pbar i{display:block;height:100%;background:linear-gradient(90deg,#29a9e1,#52bce8);border-radius:4px;transition:.4s}
.task .meta{text-align:right;font-size:12px;color:var(--gray)}
.chkbtn{flex:0 0 auto;padding:8px 16px;border-radius:999px;border:1.5px solid var(--blue2);background:#fff;color:var(--blue);font-size:13px;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap}
.chkbtn:active{transform:scale(.93)}
.chkbtn.done{background:linear-gradient(90deg,#37b24d,#51cf66);border-color:transparent;color:#fff}
.rewards{display:flex;gap:10px}
.reward{flex:1;background:rgba(255,255,255,.6);border-radius:16px;padding:14px 8px;text-align:center;box-shadow:var(--shadow-sm);cursor:pointer}
.reward .em{font-size:30px}
.reward .rn{font-size:12px;color:var(--blue-ink);margin:6px 0 3px;font-weight:600;line-height:1.3}
.reward .pt{font-size:13px;font-weight:800;color:var(--blue)}
/* calendar */
.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cal-head .m{font-weight:800;font-size:17px}
.cal-head .nav{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.7);border:none;color:var(--blue);font-size:16px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.grid .wd{color:var(--gray2);font-size:12px;padding:6px 0}
.day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:50%;position:relative;cursor:pointer;font-weight:600;color:var(--blue-ink)}
.day.mute{color:#c7cde6}
.day.period{background:var(--pink-soft);color:#c0396a}
.day.fertile{background:#dfe6ff}
.day.ovul{background:var(--blue);color:#fff}
.day.today{outline:2px solid var(--blue2)}
.day.has::after{content:"";position:absolute;bottom:4px;width:5px;height:5px;border-radius:50%;background:var(--blue)}
.legend{display:flex;justify-content:space-around;margin-top:12px;font-size:12px;color:var(--gray)}
.legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
.info-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px dashed var(--line);font-size:14px}
.info-row:last-child{border:none}
.info-row .k{color:var(--gray);flex:1;display:flex;align-items:center;gap:8px}
.info-row .v{font-weight:700}
.two-btn{display:flex;gap:10px;margin-bottom:16px}
.two-btn button{flex:1;padding:13px;border-radius:16px;border:1px solid rgba(92,124,250,.4);background:rgba(255,255,255,.7);color:var(--blue-deep);font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.symp{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.symp span{border-radius:14px;padding:9px 14px;font-size:13px;font-weight:700;color:#fff;box-shadow:var(--shadow-sm)}
/* ===== 周期页 大色块预测卡 ===== */
.predict{display:flex;gap:10px;margin-bottom:16px}
.predict .pcard{flex:1;border-radius:20px;padding:16px 14px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.predict .pcard .plabel{font-size:12px;font-weight:700;opacity:.92}
.predict .pcard .pval{font-size:20px;font-weight:900;margin-top:6px;line-height:1.1}
.predict .pcard .psub{font-size:11px;opacity:.85;margin-top:3px}
.predict .pcard .pblob{position:absolute;right:-14px;bottom:-16px;width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.22)}
/* insights chart */
.chart{width:100%;height:180px;margin:6px 0}
.flow{display:flex;align-items:center;gap:6px;overflow-x:auto;padding:4px 0}
.flow::-webkit-scrollbar{display:none}
.flow .node{flex:0 0 auto;background:#f3f5ff;border-radius:14px;padding:12px 10px;text-align:center;width:82px;font-size:12px;font-weight:600;color:var(--blue-deep)}
.flow .node.hot{background:#dfe6ff}
.flow .node .em{font-size:22px;display:block;margin-bottom:4px}
.flow .arr{color:var(--blue2);font-size:16px;flex:0 0 auto}
/* science */
.pms-card{background:linear-gradient(120deg,#fff6d6,#e7f5fb);position:relative;overflow:hidden}
.pms-card h2{margin:0 0 10px;font-size:24px;color:var(--blue-deep)}
.pms-card p{margin:0;font-size:14px;line-height:1.6;color:#5a5560;max-width:78%}
.read-btn{margin-top:14px;padding:10px 20px;border:none;border-radius:14px;background:linear-gradient(90deg,#29a9e1,#52bce8);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.art{display:flex;align-items:center;gap:14px;padding:14px;background:var(--card);border-radius:18px;margin-bottom:12px;box-shadow:var(--shadow-sm);cursor:pointer}
.art .ai{width:44px;height:44px;border-radius:50%;background:#e7f5fb;display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto}
.art h4{margin:0 0 3px;font-size:15px}
.art p{margin:0;font-size:12px;color:var(--gray)}
.art .arw{color:var(--gray2);font-size:18px}
.quick{display:flex;gap:8px;overflow-x:auto;padding:4px 0}
.quick::-webkit-scrollbar{display:none}
.quick span{flex:0 0 auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:9px 14px;font-size:13px;font-weight:600;color:var(--blue-deep);display:flex;align-items:center;gap:6px}
.disclaimer{display:flex;align-items:center;gap:10px;background:linear-gradient(100deg,#dfe6ff,#eae4ff);border-radius:16px;padding:13px 16px;font-size:13px;color:var(--blue-deep);font-weight:600;margin-top:4px}
/* modal / toast */
.overlay{position:absolute;inset:0;background:rgba(30,42,94,.35);backdrop-filter:blur(4px);z-index:80;display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:26px;width:100%;max-height:78%;overflow-y:auto;padding:22px;box-shadow:0 30px 60px rgba(30,42,94,.4);animation:rise .3s}
.modal::-webkit-scrollbar{display:none}
.brief-head{text-align:center;margin-bottom:16px}
.brief-head .day{font-size:13px;color:var(--gray)}
.brief-head h2{margin:4px 0;font-size:22px;color:var(--blue-deep)}
.brief-sec{margin-bottom:16px}
.brief-sec .st{font-weight:700;font-size:14px;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.brief-sec p{margin:0;font-size:14px;line-height:1.6;color:#54608f}
.close-btn{width:100%;padding:13px;border:none;border-radius:16px;background:linear-gradient(90deg,#29a9e1,#52bce8);color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:6px}
.toast{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);background:rgba(30,42,94,.9);color:#fff;padding:11px 20px;border-radius:20px;font-size:14px;z-index:90;animation:rise .3s}
/* ===== 打卡奖励动效 ===== */
.reward-layer{position:absolute;inset:0;pointer-events:none;z-index:200;display:flex;align-items:center;justify-content:center;overflow:hidden}
.coin-pop{font-size:66px;filter:drop-shadow(0 6px 14px rgba(245,159,0,.45));animation:coinPop 1.15s cubic-bezier(.2,.8,.3,1) forwards}

function extract(text){
  const found=[]; const seenLabel=new Set(); const inds=new Set();
  for(const r of RULES){

      const lb = r.label(text);
      if(seenLabel.has(lb)) continue;
      seenLabel.add(lb);
      found.push({cat:r.cat, icon:r.icon, label:lb, ind:r.ind});
      inds.add(r.ind);

/* ================= CYCLE PHASE ================= */
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/864e5); }
function cyclePhase(){
  const d = daysBetween(S.cycle.last, TODAY); // day in cycle (0-indexed from period start)
  const len = S.cycle.avgLen;
  const toNext = len - d;
  const prog = Math.min(99, Math.round(d/len*100));
  let phase="卵泡期", emoji="🌱";
  if(d<=5) {phase="月经期"; emoji="🩸";}
  else if(d<=12){phase="卵泡期"; emoji="🌱";}
  else if(d<=16){phase="排卵期"; emoji="💗";}
  else {phase="黄体期"; emoji="🌗";}
  return {d, toNext, prog, phase, emoji};
}
/* 由周期模型算出某个月的经期/易孕期/排卵日标记 */
function cycleMarks(year, month){
  const period=new Set(), fertile=new Set(), ovul=new Set();
  const base=new Date(S.cycle.last), len=S.cycle.avgLen, plen=S.cycle.periodLen||5;
  for(let k=-4;k<=4;k++){
    const start=new Date(base); start.setDate(start.getDate()+k*len);
    for(let i=0;i<plen;i++){ const d=new Date(start); d.setDate(d.getDate()+i); if(d.getFullYear()===year&&d.getMonth()===month) period.add(d.getDate()); }
    const ov=new Date(start); ov.setDate(ov.getDate()+len-14);
    if(ov.getFullYear()===year&&ov.getMonth()===month) ovul.add(ov.getDate());
    for(let i=1;i<=5;i++){ const f=new Date(ov); f.setDate(f.getDate()-i); if(f.getFullYear()===year&&f.getMonth()===month) fertile.add(f.getDate()); }
  }
  return {period, fertile, ovul};
}
/* 最近一次月经开始 & 预计下次 */
function periodDates(){
  const base=new Date(S.cycle.last), len=S.cycle.avgLen, today=new Date(TODAY);
  let last=new Date(base);
  while(true){ const n=new Date(last); n.setDate(n.getDate()+len); if(n>today) break; last=n; }
  const next=new Date(last); next.setDate(next.getDate()+len);
  return {last, next};
}
function fmtMD(d){ return (d.getMonth()+1)+"月"+d.getDate()+"日"; }

const AI = {

  userConfigured(){ const c=this.cfg(); return !!(c.enabled && c.key); },
  on(){ return this.userConfigured() || !!window.AI_READY; },
  async call(system, userContent, {json=false, maxTokens=1024}={}){
    const c=this.cfg();
    let text='';
    if(!this.userConfigured() && window.AI_READY){
      // 默认走后端代理（真实大模型），前端无需配置

      text=d.text||'';
      if(json){ const m=text.match(/\{[\s\S]*\}/); return JSON.parse(m?m[0]:text); }
      return text;
    }
    const base=(c.base||'https://api.anthropic.com').replace(/\/+$/,'');
    const model=c.model||'claude-opus-4-8';
    const ctrl=new AbortController(); const timer=setTimeout(()=>ctrl.abort(), 25000);
    try{
      if((c.proto||'anthropic')==='anthropic'){
        const r=await fetch(base+'/v1/messages',{method:'POST',signal:ctrl.signal,headers:{
          'content-type':'application/json','x-api-key':c.key,
          'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'
        },body:JSON.stringify({model,max_tokens:maxTokens,system,messages:[{role:'user',content:userContent}]})});
        if(!r.ok) throw new Error('HTTP '+r.status+' '+(await r.text()).slice(0,140));
        const d=await r.json(); text=(d.content||[]).map(b=>b.text||'').join('');
      } else { // OpenAI-compatible proxy
        const r=await fetch(base+'/chat/completions',{method:'POST',signal:ctrl.signal,headers:{
          'content-type':'application/json','authorization':'Bearer '+c.key
        },body:JSON.stringify({model,max_tokens:maxTokens,messages:[{role:'system',content:system},{role:'user',content:userContent}]})});
        if(!r.ok) throw new Error('HTTP '+r.status+' '+(await r.text()).slice(0,140));
        const d=await r.json(); text=d.choices[0].message.content;
      }
      clearTimeout(timer);
      if(json){ const m=text.match(/\{[\s\S]*\}/); return JSON.parse(m?m[0]:text); }
      return text;
    } finally { clearTimeout(timer); }
  }
};

async function aiExtract(text){
  if(!AI.on()) return extract(text);
  try{
    const d=await AI.call(EXTRACT_SYS, extractUser(text), {json:true, maxTokens:600});
    const events=(d.events||[]).map(e=>({cat:e.category||'mood', icon:e.icon||'•', label:e.label||'已记录', ind:e.indicator||'情绪'}));
    if(!events.length) return extract(text);
    return {events, indicators:[...new Set(events.map(e=>e.ind))]};
  }catch(e){ console.warn('AI extract fallback:', e.message); return extract(text); }
}

function confirmRecord(){
  const p=window._pending; if(!p)return;

  if(!S.timeline[TODAY]) S.timeline[TODAY]=[];

  const seen=new Set(S.timeline[TODAY].map(e=>e.cat+'|'+e.label));
  const evs=[];
  for(const e of p.events){ const k=e.cat+'|'+e.label; if(seen.has(k)) continue; seen.add(k); evs.push({cat:e.cat,icon:e.icon,label:e.label,ind:e.ind,time}); }
  if(evs.length){
    evs.forEach(e=>S.timeline[TODAY].push(e));
    api('POST','/api/entries',{date:TODAY,events:evs}).catch(e=>console.warn('save entries',e.message));

  S.draft=""; S.selectedMoods=[]; window._pending=null;

  } else {

  }
}

function classifyMsg(text){
  const t=text||'';
  if(/吵|发火|生气|冲突|翻脸|烦躁|烦死|好烦|急躁|易怒|想骂/.test(t)) return 'anger';
  if(/焦虑|紧张|不安|慌|心慌|担心|压力/.test(t)) return 'anxiety';
  if(/难过|想哭|哭|低落|郁|丧|沮丧|委屈|难受|不开心|emo/i.test(t)) return 'low';
  if(/累|疲惫|没力气|没劲|乏|好困|不想动|没动力|干不动|提不起/.test(t)) return 'tired';
  if(/甜|馋|想吃/.test(t)) return 'craving';
  if(/便秘|拉不出|没拉|拉屎|排便|便便|肚子疼|腹/.test(t)) return 'bowel';
  if(/失眠|睡不着|没睡好|睡不好|熬夜|睡得少/.test(t)) return 'sleep';
  if(/平静|还行|还好|不错|开心|挺好|舒服|放松/.test(t)) return 'calm';
  return '';
}
function pickEmpathy(cat){ const arr=EMPATHY[cat]||EMPATHY.default; return arr[Math.floor(Math.random()*arr.length)]; }
function pickAction(text){
  const cat=classifyMsg(text)||'default';
  const pool=(ACTION_POOL[cat]||ACTION_POOL.default);
  let cands=pool.filter(a=>a.q!==window._lastActionQ); if(!cands.length) cands=pool;
  const a=cands[Math.floor(Math.random()*cands.length)];
  window._lastActionQ=a.q;
  return a;
}

async function aiRespond(userText){
  window._lastUserText=userText;
  if(!AI.on()){ localRespond(userText); return; }
  if(!window._chatInds) window._chatInds=new Set();
  extract(userText).indicators.forEach(i=>window._chatInds.add(i));
  S.chat.push({role:'ai', text:'', typing:true}); render(); scrollChat();
  let result=null;
  try{ result=await AI.call(chatSystem(), buildChatContext(window._chatInds.size), {json:true, maxTokens:700}); }
  catch(e){ console.warn('AI chat fallback:', e.message); }
  S.chat=S.chat.filter(m=>!m.typing);
  if(!result){ localRespond(userText); return; }
  S.chat.push({role:'ai', text:result.reply||'我在这里陪着你。', action:result.action||null});
  if(result.followup) S.chat.push({role:'ai', text:result.followup});
  else if(window._chatInds.size>=3) S.chat.push({role:'ai', text:'谢谢你告诉我这些，要不要看看今天的简报？', followBtns:['📄 看今日简报']});
  save();
}
function localRespond(userText){
  window._lastUserText=userText;
  const {indicators}=extract(userText);
  if(!window._chatInds) window._chatInds=new Set();
  indicators.forEach(i=>window._chatInds.add(i));
  const have=window._chatInds.size;
  // 根据用户这句话的情绪/内容，从任务库随机挑一个贴切的小动作
  const cat=classifyMsg(userText);
  const emp = pickEmpathy(cat);
  const act = pickAction(userText);
  let text = emp + "\n" ;
  const msg={role:"ai", text, action:act};
  S.chat.push(msg);
  // dynamic multi-turn: collect until 3 indicators
  if(have<3){
    const missing=ALL_INDS.filter(i=>!window._chatInds.has(i));
    const ask = FOLLOWUP[missing[0]]||"还有什么想说的吗？";
    S.chat.push({role:"ai", text:"如果愿意的话，也可以多告诉我一点：\n"+ask, followBtns:quickOptions(missing[0])});
  } else {
    S.chat.push({role:"ai", text:"谢谢你告诉我这些。我已经把今天的状态记下来了，要不要看看今天的简报？", followBtns:["📄 看今日简报"]});
  }
  save();
}
function quickOptions(ind){
  const map={
    "情绪":["还挺烦的","有点低落","还好"],
    "排便":["今天拉了","有点便秘","没注意"],
    "睡眠":["没睡好","睡得还行"],
    "皮肤":["爆痘了","还行"],
    "生活事件":["和伴侣吵架了","工作压力大","没什么事"],
    "精力":["特别累","还有点劲"],
  };
  return map[ind]||["嗯","还好"];
}

function quickReply(t){
  if(t==="📄 看今日简报"){ openBrief(TODAY); return; }

function chatBtn(kind, idx){
  if(kind==="try"){
    let act=(idx!=null&&S.chat[idx])?S.chat[idx].action:null;
    if(!act){ for(let i=S.chat.length-1;i>=0;i--){ if(S.chat[i].action){ act=S.chat[i].action; break; } } }
    if(act) acceptChatAction(act);
    return;
  }
  if(kind==="another"){ const a=pickAction(window._lastUserText||''); S.chat.push({role:"ai",text:"换一个试试：",action:a}); }
  if(kind==="nah"){ S.chat.push({role:"ai",text:"没关系，不是每个建议都合适。你愿意多说说是什么让你觉得难吗？", followBtns:["我就是很累","不想说"]}); }
  save(); render(); scrollChat();
}

{id:'emo',icon:'🧠',title:'为什么月经前情绪会波动',sub:'了解激素变化如何影响你的情绪、睡眠和注意力',html:`<div class="kb">
<p><b>一句话理解：</b>月经前几天，体内的<b>雌激素</b>和<b>孕酮</b>会自然"退潮"，牵动大脑里的<b>血清素、多巴胺、去甲肾上腺素</b>等情绪化学信号，于是你可能感到低落、焦虑或易怒。</p>
<div class="kb-tip">这不是你脆弱，也不是矫情——是身体的正常节律在起作用。</div>
<div class="kb-diagram"><svg viewBox="0 0 320 128"><circle cx="46" cy="58" r="28" fill="#c8d4ff"/><text x="46" y="66" font-size="24" text-anchor="middle">🩸</text><text x="46" y="110" font-size="11" text-anchor="middle" fill="#6b7599">雌/孕酮↓</text><text x="112" y="64" font-size="20" text-anchor="middle" fill="#52bce8">➜</text><circle cx="160" cy="58" r="28" fill="#cfeaf6"/><text x="160" y="66" font-size="24" text-anchor="middle">🧠</text><text x="160" y="110" font-size="10.5" text-anchor="middle" fill="#6b7599">血清素/多巴胺↓</text><text x="226" y="64" font-size="20" text-anchor="middle" fill="#52bce8">➜</text><circle cx="274" cy="58" r="28" fill="#b7c6ff"/><text x="274" y="66" font-size="24" text-anchor="middle">🌧️</text><text x="274" y="110" font-size="11" text-anchor="middle" fill="#6b7599">低落/焦虑</text></svg></div>
<h3>🔬 发生了什么</h3>
<table><tr><th>化学信号</th><th>经前变化</th><th>你可能感觉到</th></tr>
<tr><td>雌激素</td><td>排卵后下降</td><td>情绪敏感、精力下降</td></tr>

<h3>✅ 可以怎么做</h3>
<ul><li>📅 提前预判："这几天我会更敏感"，就更容易善待自己</li><li>🚶 规律运动 + 晒太阳，帮助提升血清素</li><li>🥗 稳定血糖：复合碳水 + 蛋白质，少咖啡因和酒精</li><li>😴 保证睡眠，把重要决定尽量避开这个窗口</li><li>🤝 允许自己慢一点，情绪通常在月经开始后就会好转</li></ul>

{id:'track',icon:'📝',title:'如何记录规律，但不过度紧张',sub:'简单记录，帮助你更好地看见趋势，而不是焦虑',html:`<div class="kb">
<h3>为什么记录有用</h3>

<h3>🖊️ 每天记什么就够了</h3>
<ul><li>🩸 <b>周期日</b>：来了/走了、量的多少</li><li>😊 <b>心情</b>：1~5 分，或一个表情</li><li>⚡ <b>精力</b>：满 / 一般 / 很累</li><li>🤕 <b>身体</b>：腹痛、乳房胀、头痛、睡眠（有就标一下）</li></ul>
<div class="disclaimer" style="margin:12px 0 0">⚠️ 科普帮助你理解自己，但不能替代医疗建议。</div>
<div class="kb-ref">参考：UW Medicine 周期记录建议；PubMed 症状追踪 App 对症状报告的影响。</div></div>`},

{id:'help',icon:'💗',title:'什么时候可以考虑寻求专业帮助',sub:'识别需要关注的信号，知道何时向专业人士求助',html:`<div class="kb">
<p>大多数经前不适会随月经开始缓解，属正常范围。但当症状<b>严重、持续恶化，或影响到正常生活</b>时，寻求专业帮助是明智且值得的——这不是小题大做，而是照顾自己。</p>

{id:'pms',icon:'💧',title:'PMS（经前综合征）',sub:'经前几天到一两周内出现的一组身体和情绪变化',html:`<div class="kb">
<p>PMS 指在<b>月经来临前 5~11 天</b>出现、并在<b>月经开始前后消失</b>的一组症状。它很常见，也<b>不代表你有问题</b>。约 <b>13%~18%</b> 的育龄女性有明显 PMS。</p>
<div class="kb-diagram"><svg viewBox="0 0 320 108"><line x1="20" y1="58" x2="300" y2="58" stroke="#b7c6ff" stroke-width="3"/><rect x="196" y="44" width="74" height="28" rx="6" fill="#ffd0e0"/><text x="233" y="63" font-size="11" text-anchor="middle" fill="#c0396a">😣 症状期</text><circle cx="280" cy="58" r="9" fill="#ff8fab"/><text x="280" y="88" font-size="10" text-anchor="middle" fill="#6b7599">月经开始</text><text x="233" y="36" font-size="10" text-anchor="middle" fill="#6b7599">经前 1~2 周</text><text x="108" y="88" font-size="10" text-anchor="middle" fill="#6b7599">通常无明显症状</text></svg></div>
<h3>常见表现</h3>
<table><tr><th>🧠 情绪</th><th>🩺 身体</th></tr>
<tr><td>情绪波动、易怒</td><td>乳房胀痛</td></tr>
<tr><td>低落、爱哭</td><td>腹胀、水肿感</td></tr>
<tr><td>焦虑、紧张</td><td>腹痛（痛经）</td></tr>
<tr><td>注意力下降</td><td>头痛、疲惫</td></tr>
<tr><td>想吃甜食</td><td>睡眠变化</td></tr></table>
<p><b>为什么会这样：</b>经前雌激素、孕酮自然回落，牵动血清素、多巴胺等，从而带来情绪与身体变化。关键不在激素"量"异常，而在于对波动的敏感度因人而异。</p>
<h3>🌿 自我照护</h3>
<ul><li>🥗 稳定血糖：复合碳水+蛋白质，少咖啡因/酒精/高盐</li><li>🚶 规律运动、晒太阳</li><li>😴 保证睡眠</li><li>🧘 减压：呼吸、正念、允许自己慢下来</li><li>📅 记录趋势，提前预判</li></ul>
<div class="kb-tip">🚩 当症状<b>严重、逐月加重或影响生活</b>时，请寻求专业帮助（更严重的一种叫 PMDD）。</div>
<div class="disclaimer" style="margin:12px 0 0">⚠️ 科普帮助你理解自己，但不能替代医疗建议。</div>
<div class="kb-ref">参考：默沙东诊疗手册·经前综合征(PMS)。</div></div>`},

{id:'pmdd',icon:'☁️',title:'PMDD（经前烦躁障碍）',sub:'PMS 的一种严重形式，以强烈情绪症状为主',html:`<div class="kb">
<p>PMDD 是 PMS 中<b>较为严重</b>的一类，在月经前 1 周周期性出现强烈的情绪、行为和躯体症状，来潮后自然缓解。它已被 DSM-5 正式列为一种心境障碍——<b>是一种真实的疾病，不是"矫情"。</b>约 <b>1.2%~6.4%</b> 的育龄女性受其影响。</p>
<div class="kb-diagram"><svg viewBox="0 0 320 120"><rect x="14" y="14" width="140" height="92" rx="12" fill="#cfeaf6"/><text x="84" y="40" font-size="14" font-weight="bold" text-anchor="middle" fill="#3b6bd6">💧 PMS</text><text x="84" y="62" font-size="10" text-anchor="middle" fill="#6b7599">轻~中度 · 更"烦人"</text><text x="84" y="80" font-size="10" text-anchor="middle" fill="#6b7599">以身体不适为主</text><text x="84" y="97" font-size="10" text-anchor="middle" fill="#6b7599">影响相对较小</text><rect x="166" y="14" width="140" height="92" rx="12" fill="#aebfff"/><text x="236" y="40" font-size="14" font-weight="bold" text-anchor="middle" fill="#26348a">☁️ PMDD</text><text x="236" y="62" font-size="10" text-anchor="middle" fill="#3a4680">严重 · 更"失控"</text><text x="236" y="80" font-size="10" text-anchor="middle" fill="#3a4680">以强烈情绪为主</text><text x="236" y="97" font-size="10" text-anchor="middle" fill="#3a4680">严重影响生活</text></svg></div>
<table><tr><th>维度</th><th>PMS</th><th>PMDD</th></tr>
<tr><td>严重程度</td><td>轻~中度</td><td>严重</td></tr>
<tr><td>症状数量</td><td>≤4 种</td><td>≥5 种</td></tr>
<tr><td>症状类型</td><td>身体为主</td><td>情绪为主</td></tr>
<tr><td>功能影响</td><td>较小</td><td>明显干扰</td></tr></table>
<h3>核心症状</h3>
<ul><li>😢 显著情绪低落、无望、自我否定</li><li>😡 明显易怒、人际冲突增多</li><li>😰 焦虑、紧张、情绪不稳、易哭</li><li>😴 兴趣减退、乏力、食欲与睡眠改变</li></ul>
<div class="kb-tip">🩺 <b>如何确诊：记录是关键。</b>经前 ≥5 种症状、至少 1 种是情绪症状、来潮后几天内缓解。医生通常需要你每天记录、持续至少 2 个周期，才能把 PMDD 与普通抑郁/焦虑区分开。</div>
<h3>💊 治疗方向（需遵医嘱）</h3>

{id:'sleep',icon:'🌙',title:'睡眠',sub:'为什么经前更容易睡不好，以及可以怎么做',html:`<div class="kb">

<ul><li>📉 <b>孕酮下降</b>：让人犯困的孕酮一回落，困意也随之消失</li><li>🌗 <b>褪黑素受抑制</b>：压低"助眠激素"，入睡难、睡得浅</li><li>🌡️ <b>体温偏高</b>：入睡需要体温下降，因此更难睡着</li><li>💗 <b>血清素波动</b>：带来情绪低落、疲劳与睡眠问题</li></ul>
<div class="kb-tip">⏰ 睡眠和情绪最糟的窗口，通常在<b>月经来潮前 4~5 天到来潮前 2 天</b>。</div>
<h3>✅ 改善睡眠</h3>

<tr><td>🌡️ 营造凉爽</td><td>卧室偏凉、温水澡后让体温自然下降</td></tr>
<tr><td>🧘 减压</td><td>长期压力升高皮质醇→抑制褪黑素</td></tr>
<tr><td>🌙 固定作息</td><td>规律上床/起床，稳定生物钟</td></tr></table>

{id:'cramps',icon:'🩹',title:'腹痛（痛经）',sub:'为什么经期会腹痛，以及可以怎么缓解',html:`<div class="kb">
<p>最常见的是<b>原发性痛经</b>——没有器官病变的经期腹痛。罪魁祸首是一种叫 <b>前列腺素</b> 的物质。</p>
<div class="kb-diagram"><svg viewBox="0 0 320 118"><circle cx="42" cy="52" r="24" fill="#c8d4ff"/><text x="42" y="60" font-size="19" text-anchor="middle">🧪</text><text x="42" y="94" font-size="9.5" text-anchor="middle" fill="#6b7599">前列腺素↑</text><text x="82" y="58" font-size="15" text-anchor="middle" fill="#52bce8">➜</text><circle cx="120" cy="52" r="24" fill="#d0dbff"/><text x="120" y="60" font-size="19" text-anchor="middle">🤰</text><text x="120" y="94" font-size="9.5" text-anchor="middle" fill="#6b7599">子宫收缩</text><text x="160" y="58" font-size="15" text-anchor="middle" fill="#52bce8">➜</text><circle cx="198" cy="52" r="24" fill="#bcccff"/><text x="198" y="60" font-size="19" text-anchor="middle">🩸</text><text x="198" y="94" font-size="9.5" text-anchor="middle" fill="#6b7599">供血减少</text><text x="238" y="58" font-size="15" text-anchor="middle" fill="#52bce8">➜</text><circle cx="276" cy="52" r="24" fill="#aebfff"/><text x="276" y="60" font-size="19" text-anchor="middle">😣</text><text x="276" y="94" font-size="9.5" text-anchor="middle" fill="#6b7599">疼痛</text></svg></div>
<p>经期子宫内膜释放前列腺素 → 引起子宫强烈收缩 → 流向子宫的血流减少、缺血 → 产生疼痛，前列腺素还会让神经末梢更敏感。前列腺素越多，通常越痛。</p>
<h3>✅ 如何缓解</h3>
<table><tr><th>方法</th><th>要点</th></tr>
<tr><td>💊 布洛芬等 NSAIDs</td><td>一线止痛，从源头减少前列腺素</td></tr>
<tr><td>⏰ 趁早服药</td><td>痛经开始前或刚开始就吃效果最好</td></tr>
<tr><td>🔥 热敷</td><td>暖水袋敷小腹，促循环、缓痉挛</td></tr>
<tr><td>🚶 运动+休息</td><td>保证睡眠、适度活动有助缓解</td></tr>
<tr><td>💊 口服避孕药</td><td>需避孕或难治时的选择（遵医嘱）</td></tr></table>
<div class="kb-tip">💡 <b>服药时机是关键：</b>布洛芬要在痛之前或刚开始就用——它需约 2 小时起效，等痛得厉害再吃往往效果打折。用药注意胃肠道副作用，遵说明书或医嘱。</div>
<div class="kb-tip">🚩 若痛经<b>进行性加重、药物无效、伴异常出血或非经期腹痛</b>，可能是继发性痛经（如子宫内膜异位症），应就医排查。</div>
<div class="disclaimer" style="margin:12px 0 0">⚠️ 科普帮助你理解自己，但不能替代医疗建议。</div>
<div class="kb-ref">参考：默沙东诊疗手册·痛经；北京市中医药管理局·原发性痛经。</div></div>`}
];

const MOOD_IP=[
  {key:'anger',   img:'/assets/ip/anger.jpg',   name:'愤怒',  bg:'#f24b3d', test:/愤怒|生气|发火|吵|冲突|翻脸|暴躁/},

  {key:'blue',    img:'/assets/ip/blue.jpg',    name:'忧郁',  bg:'#5b76c9', test:/低落|难过|想哭|郁|丧|沮丧|忧郁|委屈/},

  {key:'happy',   img:'/assets/ip/happy.jpg',   name:'开心',  bg:'#ffd23e', test:/开心|不错|愉快|快乐|平稳|平静|放松|想念|温柔|甜蜜/},

function moodIP(labels){
  const s=(labels||[]).join(' ');
  for(const m of MOOD_IP) if(m.test.test(s)) return m;
  return {key:'health', img:'/assets/ip/health.jpg', name:'平和', bg:'#8ed081'};
}
function buildBrief(date){
  const ev=dedupeEv(S.timeline[date]||[]);
  const ph=cyclePhase();
  const cats=ev.map(e=>e.label);
  const list = cats.length? cats.join("、") : "今天还没有记录";
  let encourage="你今天愿意停下来记录自己，这本身就是一种照顾。";
  if(cats.some(c=>/冲突/.test(c))) encourage="和最亲近的人起冲突时，情绪往往最汹涌。这不代表你们的关系有问题，只是此刻的你需要被理解。";
  else if(cats.some(c=>/低落|焦虑|烦躁/.test(c))) encourage="情绪来的时候像潮水，会涨也会退。你已经在认真地看见它了。";
  let advice="今晚可以早一点休息，给身体一点修复的时间。";
  if(cats.some(c=>/便秘|偏硬/.test(c))) advice="黄体期孕酮升高会让肠道变慢，多喝温水、吃点富含纤维的食物会舒服一些。";
  else if(cats.some(c=>/精力|低动力/.test(c))) advice="没力气的时候不必硬撑，把今天的 DDL 拆成最小的一步，做一点点就好。";
  return {date, phase:ph.phase, emoji:ph.emoji, list, encourage, advice, ev, ip:moodIP(cats)};
}

    <div id="au_err" style="font-size:13px;color:#fff3bf;font-weight:700;min-height:18px;margin:10px 0 4px"></div>
    <div style="flex:1;min-height:10px"></div>
    <button onclick="doAuth()" style="width:100%;padding:16px;border-radius:18px;border:none;cursor:pointer;background:var(--tomato);color:#fff;font-size:16px;font-weight:800;letter-spacing:1px;box-shadow:0 10px 24px -8px rgba(150,20,20,.55)">${mode==='register'?'注册并开始设置':'登录'}</button>
    <div style="text-align:center;margin-top:16px;font-size:13px;color:rgba(255,255,255,.92)">${mode==='register'?'已有账号？<button onclick="goLogin()" style="background:none;border:none;color:#fff;font-weight:800;text-decoration:underline;cursor:pointer;font-size:13px">直接登录</button>':'还没有账号？<button onclick="goRegister()" style="background:none;border:none;color:#fff;font-weight:800;text-decoration:underline;cursor:pointer;font-size:13px">立即注册</button>'}</div>
    <div style="text-align:center;font-size:11px;color:rgba(255,255,255,.8);margin-top:14px">🔒 数据存储在 SQLite 数据库中，非本地缓存</div>
  </div>`;
}
function validAccount(a){ return /^1[3-9]\d{9}$/.test(a) || /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(a); }
function sendCode(){
  const acc=(document.getElementById('au_user').value||'').trim();
  if(!validAccount(acc)){ authErr('请输入正确的邮箱或手机号'); return; }
  window._codeSent=true;
  const isPhone=/^1[3-9]\d{9}$/.test(acc);
  authErr('验证码已发送至你的'+(isPhone?'手机':'邮箱')+'，请注意查收', true);
  toast('验证码已发送，请查收');
  const btn=document.getElementById('code_btn'); if(!btn) return;
  clearTimeout(window._codeTimer); let n=60; btn.disabled=true; btn.style.opacity='.55';
  (function tick(){ if(n<=0){ btn.disabled=false; btn.style.opacity=''; btn.textContent='重新获取'; return; } btn.textContent=n+' s'; n--; window._codeTimer=setTimeout(tick,1000); })();
}
function goWelcome(){ window.SCREEN='welcome'; render(); }
function goRegister(){ window.SCREEN='register'; render(); }
function goLogin(){ window.SCREEN='login'; render(); }
async function doAuth(){
  const u=(document.getElementById('au_user').value||'').trim();
  const p=document.getElementById('au_pass').value||'';
  const mode=window.SCREEN==='register'?'register':'login';
  if(!validAccount(u)){ authErr('请输入正确的邮箱或手机号'); return; }
  if(mode==='register'){
    const code=(document.getElementById('au_code').value||'').trim();
    if(!window._codeSent){ authErr('请先获取验证码'); return; }
    if(!/^\d{6}$/.test(code)){ authErr('请输入 6 位验证码'); return; }
  }
  if(p.length<4){ authErr('密码至少 4 位'); return; }
  authErr('请稍候…', true);
  try{
    const data=await api('POST', mode==='register'?'/api/register':'/api/login', {username:u,password:p});
    applyServerData(data); window.AUTH=true; window._authUser=''; window._codeSent=false;
    if(mode==='register'){ window._onb={step:0,nickname:'',gender:'女性',age:'',lastPeriod:S.cycle.last||'2025-06-18',cycleLen:S.cycle.avgLen||28,periodUnknown:false}; window.SCREEN='welcomeBack'; }
    else { window.SCREEN='app'; S.tab='home'; }
    render();
  }catch(e){ authErr(cleanErr(e.message)); }
}
function doLogout(){
  const ov=document.querySelector('.overlay'); if(ov) ov.remove();
  api('POST','/api/logout').catch(()=>{}).finally(()=>{ window.AUTH=false; S={}; window.SCREEN='welcome'; render(); });
}

/* ---- 注册成功 ---- */
function viewWelcomeBack(){
  return `<div class="ob">
    <div class="ob-hero">
      <div style="width:96px;height:96px;border-radius:28px;background:var(--sun);display:flex;align-items:center;justify-content:center;font-size:46px;box-shadow:0 10px 26px -8px rgba(180,140,0,.5)">🎉</div>
      <div style="font-size:24px;font-weight:800;color:#fff;margin-top:18px;text-shadow:0 2px 8px rgba(40,70,10,.25)">注册成功！</div>
      <div style="font-size:14px;color:rgba(255,255,255,.95);text-align:center;max-width:250px;margin-top:8px;line-height:1.7">欢迎加入微澜 ✨<br>接下来花 1 分钟，让小澜更懂你。</div>
    </div>
    <button onclick="startOnboarding()" style="width:100%;padding:16px;border-radius:18px;border:none;cursor:pointer;background:var(--tomato);color:#fff;font-size:16px;font-weight:800;letter-spacing:1px;box-shadow:0 10px 24px -8px rgba(150,20,20,.55)">开始设置</button>
    <div style="height:4px"></div>
  </div>`;
}
function startOnboarding(){ ob().step=0; window.SCREEN='onboarding'; render(); }

/* ---- 3 张 PMS 科普引导 ---- */
const onbSlides=[
  {icon:'🌙', eyebrow:'什么是 PMS', title:'经前综合征\n是身体在提前打招呼', body:'PMS 指月经前 1–2 周，因激素波动出现的一系列身体和情绪变化。超过 90% 的女性都经历过，是很正常的生理现象。'},
  {icon:'💭', eyebrow:'常见表现', title:'不只是"情绪化"\n是真实的生理反应', list:['情绪：烦躁、低落、易哭、敏感','身体：胀痛、头痛、疲惫、便秘、爆痘','行为：想吃甜食、嗜睡或失眠']},
  {icon:'✨', eyebrow:'微澜能做什么', title:'记录感受\n让身体被看见、被理解', body:'每天花 10 秒说说感受，微澜会自动识别情绪、身体和生活事件，慢慢画出属于你的周期地图。'}
];
function viewOnboarding(){
  const i=ob().step, s=onbSlides[i];
  return `<div class="ob">
    <div style="display:flex;justify-content:flex-end"><button class="link-btn" style="color:rgba(255,255,255,.92)" onclick="skipOnboarding()">跳过</button></div>
    <div style="flex:1;display:flex;flex-direction:column">
      <div style="text-align:center">
        <div class="ob-icon">${s.icon}</div>
        <div class="ob-eyebrow">${s.eyebrow}</div>
        <div class="ob-title">${s.title}</div>
        ${s.body?`<div class="ob-sub">${s.body}</div>`:''}
      </div>
      ${s.list?`<ul class="ob-list">${s.list.map((t,k)=>`<li><span class="ob-num">${k+1}</span><span>${t}</span></li>`).join('')}</ul>`:''}
    </div>
    <div class="ob-dots">${onbSlides.map((_,k)=>`<i class="${k===i?'on':''}"></i>`).join('')}</div>
    <button class="send-btn" onclick="nextOnboarding()">${i===onbSlides.length-1?'开始设置':'下一步'}</button>
  </div>`;
}
function nextOnboarding(){ if(ob().step<onbSlides.length-1) ob().step++; else window.SCREEN='profileSetup'; render(); }
function skipOnboarding(){ window.SCREEN='profileSetup'; render(); }

/* ---- 认识你：昵称 / 性别 / 年龄 ---- */
function viewProfileSetup(){
  const o=ob();
  return `<div class="ob" style="padding-top:46px">
    <div class="ob-eyebrow" style="text-align:left">开始之前</div>
    <div class="ob-title" style="text-align:left;margin:6px 0">先认识一下你</div>
    <div class="ob-sub" style="text-align:left">这些信息帮助微澜更准确地理解你的周期与状态，只用于个性化建议。</div>
    <div class="ob-label">你的昵称</div>
    <input class="ob-input" placeholder="微澜怎么称呼你？" value="${o.nickname||''}" oninput="ob().nickname=this.value">
    <div class="ob-label">你的性别</div>
    <div class="moods" style="overflow:visible"><div style="display:flex;gap:10px;flex-wrap:wrap">${['女性','男性','其他/不透露'].map(g=>`<div class="chip ${o.gender===g?'sel':''}" onclick="setOb('gender','${g}')">${g}</div>`).join('')}</div></div>
    <div class="ob-label">你的年龄</div>
    <input class="ob-input" type="number" placeholder="例如 25" value="${o.age||''}" oninput="ob().age=this.value">
    <div style="flex:1"></div>
    <button class="send-btn" style="margin-top:24px" onclick="window.SCREEN='cycleSetup';render()">下一步</button>
  </div>`;
}
function setOb(k,v){ ob()[k]=v; render(); }

/* ---- 经期设置：上次月经 / 平均周期 ---- */
function viewCycleSetup(){
  const o=ob();
  return `<div class="ob" style="padding-top:46px">
    <div class="ob-eyebrow" style="text-align:left">经期信息</div>
    <div class="ob-title" style="text-align:left;margin:6px 0">最近一次月经\n从哪天开始？</div>
    <div class="ob-sub" style="text-align:left">帮助微澜估算你现在所处的周期阶段，随时可在设置里修改。</div>
    <div class="ob-label">选择日期</div>
    <input class="ob-input" type="date" ${o.periodUnknown?'disabled':''} value="${o.lastPeriod||''}" onchange="setPeriodDate(this.value)">
    <div class="unclear"><span>记不清具体日期也没关系</span>
      <button class="chip ${o.periodUnknown?'sel':''}" style="padding:8px 14px;font-size:12px" onclick="toggleUnclear()">${o.periodUnknown?'已选择"不清楚"':'写不清楚'}</button>
    </div>
    <div class="ob-label">平均周期长度</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">${[24,26,28,30,32].map(n=>`<div class="chip ${o.cycleLen===n?'sel':''}" onclick="setOb('cycleLen',${n})">${n} 天</div>`).join('')}</div>
    <div style="flex:1"></div>
    <button class="send-btn" style="margin-top:24px" onclick="finishOnboarding()">完成，进入微澜</button>
  </div>`;
}
function setPeriodDate(v){ ob().lastPeriod=v; if(v) ob().periodUnknown=false; render(); }
function toggleUnclear(){ const o=ob(); o.periodUnknown=!o.periodUnknown; render(); }
function finishOnboarding(){
  const o=ob();
  S.nickname=(o.nickname||'').trim()||S.user.username;
  S.profile={gender:o.gender, age:o.age?Number(o.age):null}; S.onboarded=true;
  S.cycle=S.cycle||{}; S.cycle.avgLen=o.cycleLen;
  if(!o.periodUnknown && o.lastPeriod){ S.cycle.last=o.lastPeriod; S.cycle.conf="中"; }
  else { S.cycle.conf="低"; }
  S.cycle.periodLen=S.cycle.periodLen||5;
  save();
  window.SCREEN='app'; S.tab='home'; render();
  toast('欢迎来到微澜，'+S.nickname+' ✨');
}

/* ============ MAIN RENDER ============ */
function render(){
  const scr=window.SCREEN||'welcome';
  const gate={welcome:viewWelcome,register:viewAuthForm,login:viewAuthForm,welcomeBack:viewWelcomeBack,onboarding:viewOnboarding,profileSetup:viewProfileSetup,cycleSetup:viewCycleSetup};
  if(gate[scr]){ document.getElementById('tabbar').innerHTML=''; $body.innerHTML=gate[scr](); $body.scrollTop=0; return; }
  const v={home:viewHome,cycle:viewCycle,support:viewSupport,goals:viewGoals,insights:viewInsights,science:viewScience}[S.tab]||viewHome;
  $body.innerHTML=v();
  renderTabs();
  const d=document.getElementById('draft'); if(d){ d.addEventListener('input',e=>{S.draft=e.target.value;}); }
  if(S.tab==="support") scrollChat();
}
async function boot(){
  try{
    const data=await api('GET','/api/me'); applyServerData(data); window.AUTH=true;
    if(S.onboarded===false){ window._onb={step:0,nickname:S.nickname,gender:(S.profile&&S.profile.gender)||'女性',age:(S.profile&&S.profile.age)||'',lastPeriod:S.cycle.last||'2025-06-18',cycleLen:S.cycle.avgLen||28,periodUnknown:false}; window.SCREEN='onboarding'; }
    else window.SCREEN='app';
  }
  catch(e){ window.AUTH=false; window.SCREEN='welcome'; }
  render();
}
boot();
</script>
</body>
</html>
